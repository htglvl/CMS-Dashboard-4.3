worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    server {
        listen 8501;
        server_name localhost;

        # Dashboard — strip /home, forward to Streamlit on 8502
        location /home/ {
            proxy_pass http://127.0.0.1:8502/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location = /home {
            return 302 /home/;
        }

        # OpenClaw — forward to Python proxy on 8503 (handles auth, CSP, WS)
        location /oclaw {
            proxy_pass http://127.0.0.1:8503;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Root and fallback — proxy directly to Streamlit (works with ngrok)
        location / {
            proxy_pass http://127.0.0.1:8502/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
